<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ultra F1 Racing | Console Fixed</title>
    <script type="module" crossorigin src="/F1-Racing/assets/index-CPyITiyo.js"></script>
    <link rel="stylesheet" crossorigin href="/F1-Racing/assets/index-jMHFV9bD.css">
  </head>
  <body>
    <!-- Start Menu -->
    <div id="start-menu">
      <div class="menu-content">
        <h1>Ultra F1 Racing</h1>
        <p>Testing Phase: Debug Block Car</p>
        <button id="start-button">START RACE</button>
      </div>
    </div>

    <!-- Debug HUD -->
    <div id="debug-hud">
       FPS: <span id="fps-val">0</span><br/>
       POS: <span id="pos-val">0, 0, 0</span><br/>
       INPUT: <span id="input-val">NONE</span>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls">
      <div class="ctrl-group">
        <div id="ctrl-left" class="joy-btn">◀<span>LEFT</span></div>
        <div id="ctrl-right" class="joy-btn">▶<span>RIGHT</span></div>
      </div>
      <div class="ctrl-group">
        <div id="ctrl-brake" class="joy-btn brake">■<span>BRAKE</span></div>
        <div id="ctrl-accel" class="joy-btn accel">▲<span>GAS</span></div>
      </div>
    </div>

    <div id="app"></div>
  </body>
</html>
